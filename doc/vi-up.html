/* Give the actual container height */
#vi-up-gjs { height: 500vh; width: 500vw; }

/* Make internal canvas fill it */
#vi-up-gjs .gjs-editor,
#vi-up-gjs .gjs-cv-canvas,
#vi-up-gjs .gjs-frame-wrapper {
  height: 100%;
}

.gjs-editor{
height: 85%;;
}

.viup-ext-gallery {
  max-height: 0;
  overflow: hidden;
  transition: max-height .28s ease, opacity .18s ease;
  opacity: 0;
}

.viup-ext-gallery.open {
  max-height: 70vh;
  opacity: 1;
  max-width: 100vw;
}

.viup-zoombar {
  position: absolute;
    bottom: 75px;
    left: 400px;
    width: 50%;
    /* background: #F7EFEB; */
    display: flex
;
    align-items: center;
    justify-content: center;
    gap: 50px;
    padding: 11px 0;
    font-family: 'Montserrat', sans-serif;
    z-index: 999;

}

.zoom-section {
  display: flex;
  align-items: center;
  gap: 10px;
}

.zoom-btn {
  background: #7D5B59;
  color: white;
  border: none;

  height: 28px;

  justify-content: center;
}

.zoom-btn:hover { opacity: 0.8; }

#zoom-slider {

  accent-color: #7D5B59;

}

.page-section {
  display: flex;
  align-items: center;
  gap: 12px;
  color: #6D4C41;
  font-weight: 600;
}


.viup-ext-inner {
  background: #fff9f7;
  border: 1px solid #E8DCD6;
  border-radius: 12px;
  padding: 12px;
  margin: 6px;
  box-shadow: 0 4px 12px rgba(0,0,0,.05);
  font-family: Montserrat, sans-serif;
}

.viup-ext-search input {
  width: 100%;
  padding: 8px;
  border: 1px solid #E8DCD6;
  border-radius: 8px;
}

.viup-ext-upload {
  margin-top: 8px;

  color: #fff;
  border: none;
  padding: 8px 12px;
  border-radius: 8px;

}

.gjs-one-bg {
    background-color: #EDE2DE;
}

.gjs-two-color {
    color: #7D5B59;
}

.viup-ext-grid {
  margin-top: 10px;
  display: grid;
  gap: 8px;
}
.viup-ext-grid img {
  width: 100%;
  border-radius: 6px;
}

/* Only affect the duplicated inner editor */
.vi-up-editor > .vi-up-editor {
  grid-template-columns: 1fr;          /* remove the left column for the inner editor */
}

/* Hide only the inner/second left sidebar */
.vi-up-editor > .vi-up-editor > aside.vi-up-sidebar {
  display: none !important;
}

/* Safety: if the inner editor has the bottom bar, don't offset it */
.vi-up-editor > .vi-up-editor .vi-up-rightbar {
  margin-left: 0;
}
/* Let absolutely-positioned panels anchor inside the editor */
.vi-up-editor { position: relative; }

/* Format the SECOND sidebar as a slide-over panel */
.vi-up-editor > .vi-up-editor > aside.vi-up-sidebar.viup-overlay-panel {
  position: absolute;
  top: 0;
  /* left is synced in JS to match the real width of the main sidebar (130px by default) */
  left: 0px;
  height: 110%;
  width: 320px;
  background: #fff9f7;
  border-right: 1px solid var(--viup-border);
  box-shadow: var(--viup-shadow);
  transform: translateX(-100%);            /* off-canvas by default */
  transition: transform .25s ease;
  z-index: 60;
  pointer-events: none;                     /* blocked while closed */
}

/* When “open” class is on the INNER editor, show the second aside */
.vi-up-editor > .vi-up-editor.viup-photo-open > aside.vi-up-sidebar {
  display: block !important;               /* override your hide rule ONLY when open */
}

/* Slide into view + re-enable interaction */
.vi-up-editor > .vi-up-editor.viup-photo-open > aside.vi-up-sidebar.viup-overlay-panel {
  transform: translateX(0);
  pointer-events: auto;
}

/* --- CONTACT panel styling (basic, matches your theme vars) --- */
.viup-ext-contact { padding: 0px; background:#fff9f7; }
.viup-ext-contact .viup-field { display:block; margin-bottom:10px; }
.viup-ext-contact .viup-field > span {
  display:block; font-size:12px; margin-bottom:6px;
  color: var(--viup-brown); opacity:.8;
}
.viup-ext-contact input {
  width:100%; padding:10px 12px;
  border:1px solid var(--viup-border); border-radius:10px; outline:none;
  background:#fff;
}
.viup-ext-contact .viup-actions { display:flex; gap:12px; align-items:center; justify-content:center; margin-top:12px; }
.viup-ext-contact .viup-btn-add {
  width:40px; height:40px; border-radius:50%; border:none; cursor:pointer;
  background: var(--viup-brown); color:#fff; font-size:22px; line-height:40px;
}
.viup-ext-contact .viup-btn-save {
  padding:10px 16px; border:none; border-radius:16px; cursor:pointer;
  background: var(--viup-brown); color:#fff; font-weight:600; min-width:140px;
}

/* --- SHOW ONLY THE CONTACT PANEL when contact is open --- */
.vi-up-editor > .vi-up-editor.viup-contact-open > aside.vi-up-sidebar { display:block !important; }
.vi-up-editor > .vi-up-editor.viup-contact-open > aside.vi-up-sidebar.viup-overlay-panel {
  transform: translateX(0); pointer-events:auto;
}
.vi-up-editor > .vi-up-editor.viup-contact-open > aside.vi-up-sidebar.viup-overlay-panel > * {
  display:none !important;          /* hide everything */
}
.vi-up-editor > .vi-up-editor.viup-contact-open > aside.vi-up-sidebar.viup-overlay-panel #viup-contact-ext {
  display:block !important;         /* show only the contact panel */
}

/* --- CALENDAR panel styling --- */
.viup-ext-calendar { padding:0px; background:#fff9f7; }
.viup-ext-calendar .viup-field { display:block; margin-bottom:12px; }
.viup-ext-calendar .viup-field > span {
  display:block; font-size:12px; margin-bottom:6px;
  color: var(--viup-brown); opacity:.8;
}
.viup-ext-calendar input[type="date"]{
  width:100%; padding:10px 12px;
  border:1px solid var(--viup-border); border-radius:10px; outline:none;
  background:#fff;
}
.viup-ext-calendar .viup-actions{
  display:flex; justify-content:center; gap:12px; margin-top:12px;
}
.viup-ext-calendar .viup-btn-save{
  padding:10px 16px; border:none; border-radius:16px; cursor:pointer;
  background: var(--viup-brown); color:#fff; font-weight:600; min-width:140px;
}

/* --- SHOW ONLY THE CALENDAR PANEL when calendar is open --- */
.vi-up-editor > .vi-up-editor.viup-calendar-open > aside.vi-up-sidebar { display:block !important; }
.vi-up-editor > .vi-up-editor.viup-calendar-open > aside.vi-up-sidebar.viup-overlay-panel{
  transform: translateX(0); pointer-events:auto;
}
.vi-up-editor > .vi-up-editor.viup-calendar-open > aside.vi-up-sidebar.viup-overlay-panel > *{
  display:none !important;
}
.vi-up-editor > .vi-up-editor.viup-calendar-open > aside.vi-up-sidebar.viup-overlay-panel #viup-calendar-ext{

}

/* safety: if calendar is active, keep panel expanded even without .open */
.vi-up-editor > .vi-up-editor.viup-calendar-open #viup-calendar-ext{
  max-height:70vh; opacity:1; overflow:auto;
}

/* ===== Base fields reused across panels ===== */
.viup-ext-elements, .viup-ext-location, .viup-ext-moneygift {

}
.viup-ext-elements .viup-field,

.viup-ext-elements input,

/* Elements grid demo */
.viup-elements-groups .viup-subtitle { margin:10px 0 6px; color:var(--viup-brown); font-weight:600; }

/* ===== Slide-over visibility rules (copy of your pattern) ===== */
.vi-up-editor > .vi-up-editor.viup-elements-open  > aside.vi-up-sidebar { display:block !important; }
.vi-up-editor > .vi-up-editor.viup-location-open  > aside.vi-up-sidebar { display:block !important; }

.vi-up-editor > .vi-up-editor.viup-elements-open  > aside.vi-up-sidebar.viup-overlay-panel,

.vi-up-editor > .vi-up-editor.viup-location-open  > aside.vi-up-sidebar.viup-overlay-panel > *,

/* ===== TEMPLATES & TEXT panels (theme-matched) ===== */

.viup-ext-templates input, .viup-ext-text input {

.vi-up-editor > .vi-up-editor.viup-templates-open > aside.vi-up-sidebar { display:block !important; }
.vi-up-editor > .vi-up-editor.viup-text-open      > aside.vi-up-sidebar { display:block !important; }

.vi-up-editor > .vi-up-editor.viup-text-open      #viup-text-ext {

:root{
 /* --viup-bg:#F7EFEB;            page background */
  --viup-brown:#6D4C41;        /* primary brown */
  --viup-brown-2:#8A6A5E;      /* softer */
  --viup-ink:#2f1f1b;          /* dark for floatbar */
  --viup-side:#ffffffcc;       /* sidebar tiles */
  --viup-border:#E8DCD6;
  --viup-footer-bg: #000000;      /* Navigation Bar */
  --viup-footer-text: #ffffff;    /* Text & Icon */
  --viup-radius:12px;
  --viup-shadow:0 6px 24px rgba(0,0,0,.06);
  font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
}

/* Shell */
.vi-up-editor{
  display:grid;
  grid-template-columns: 130px 1fr;      /* was: 130px 1fr 220px */
  grid-template-rows: 1fr;
  height: calc(100vh - 0px);
  background: var(--viup-bg);
}

/* Sidebar */
.vi-up-sidebar{
  display: flex;
  flex-direction: column;
  gap: 6px;
  padding: 12px 8px;
  border-right: 1px solid var(--viup-border);
  background: #fff9f7;

  /* ✨ make sidebar scrollable */
  overflow-y: auto;
  overflow-x: hidden;
  scrollbar-width: thin; /* Firefox */
  scrollbar-color: #c7b6ad #fff9f7;
  padding-bottom:100px;
}

/* optional: prettier scrollbars for Chrome */
.vi-up-sidebar::-webkit-scrollbar {
  width: 8px;
}
.vi-up-sidebar::-webkit-scrollbar-thumb {
  background-color: #c7b6ad;
  border-radius: 4px;
}
.vi-up-sidebar::-webkit-scrollbar-track {
  background: #fff9f7;

const PAGE_HEIGHT = 1000;

// Make an empty page section (no built-in heading)

function addPageBelowMain() {
  const wrapper = editor.getWrapper();
  const PAGE_HEIGHT = 1000; // each page height in px

  // Find all pages
  let pages = wrapper.find('.viup-page-wrap');
  if (!pages.length) {
    // Create first page wrapper and move only the visible design area (not toolbars)
    const main = wrapper.append('<section class="viup-page-wrap"></section>')[0];
    const kids = [...wrapper.components()];
    kids.forEach(ch => {
      if (
        ch !== main &&
        !ch.getEl()?.classList?.contains('viup-page-wrap') &&
        ch.getAttributes().id !== 'viup-expander'
      ) {
        main.append(ch);
      }
    });
    main.addStyle({ minHeight: `${PAGE_HEIGHT}px` });
    pages = [main];
  }

  // Create new empty page
  const newPage = wrapper.append('<section class="viup-page-wrap"></section>')[0];
  newPage.addStyle({
    position: 'relative',
    width: '100%',
    minHeight: `${PAGE_HEIGHT}px`,
    borderTop: '2px dashed #ccc',
  });

  newPage.append({
    type: 'text',
    content: `Page ${pages.length + 1}`,
    style: {
      fontSize: '24px',
      textAlign: 'center',
      marginTop: '400px',
      color: '#888',
    }
  });

  // Adjust scroll
  const totalHeight = (pages.length + 1) * PAGE_HEIGHT;
  wrapper.view.el.style.minHeight = `${totalHeight}px`;

  // Smooth scroll to new page
  const frame = editor.Canvas.getFrameEl();
  frame?.contentWindow?.scrollTo({ top: totalHeight - PAGE_HEIGHT, behavior: 'smooth' });
}


// One listener only
document.getElementById('vi-up-add-page-below')
  ?.addEventListener('click', addPageBelowMain);


        // Ensure all text behaves like a block container and wraps
function fixTextBox(comp) {
  if (!comp.is('text')) return;

  comp.addStyle({
    display: 'block',
    width: '200px',                   // give a default width (editable later)
    height: 'auto',
    whiteSpace: 'normal',
    overflowWrap: 'break-word',
    wordBreak: 'break-word',
    boxSizing: 'border-box'
  });
}

// Apply to existing text on load
editor.on('load', () => {
  editor.getWrapper().findType('text').forEach(fixTextBox);
});

// 1) Global canvas CSS so long words NEVER overflow (even while typing)
editor.on('load', () => {
  editor.addStyle(`
    [data-gjs-type="text"]{
      display:block;
      box-sizing:border-box;
      white-space:normal;
      overflow-wrap:anywhere;   /* breaks aaaaaaaaa... */
      word-break:break-word;    /* legacy fallback */
      height:auto;
    }
    /* also enforce wrap inside any nested spans/divs created by the RTE */
    [data-gjs-type="text"] *{
      overflow-wrap:anywhere;
      word-break:break-word;
    }
  `);
});

// 2) Re-apply "box" rules whenever editing starts/ends or content changes
function enforceTextBox(comp){
  if (!comp?.is?.('text')) return;
  comp.addStyle({
    display: 'block',
    boxSizing: 'border-box',
    whiteSpace: 'normal',
    overflowWrap: 'anywhere',
    wordBreak: 'break-word',
    height: 'auto',
    width: comp.getStyle().width || '300px'  // ensure it actually has a width
  });
}

// keep height auto while typing & after edits
editor.on('component:update:content', m => enforceTextBox(m));
editor.on('rte:enable',    () => { const s = editor.getSelected(); enforceTextBox(s); });
editor.on('rte:disable',   () => { const s = editor.getSelected(); enforceTextBox(s); });

// also run once for anything already on canvas
editor.on('load', () => editor.getWrapper().findType('text').forEach(enforceTextBox));

editor.on('component:add', comp => {
  // Only care about top-level DIVs (direct children of <body>)
  const parent = comp.parent();
  if (!parent) return; // safety

  if (comp.get('tagName') === 'div' && parent.is('body')) {
    const wrapper = editor.getWrapper();
    const allDivs = wrapper.find('div');

    // Ignore the first div, but act when a second one appears
    if (allDivs.length > 1) {
      // Create a new <section>
      const newSection = wrapper.append('<section class="viup-page-wrap"></section>')[0];

      newSection.addStyle({
        position: 'relative',
        width: '100%',
        minHeight: '1000px',
        background: '#fff',
        borderTop: '2px dashed #ccc',
      });

      // Move the newest div into the new section
      newSection.append(comp);

      // Optional label
      newSection.append({
        type: 'text',
        content: `Page ${wrapper.find('.viup-page-wrap').length}`,
        style: {
          textAlign: 'center',
          color: '#888',
          marginTop: '400px',
          fontSize: '24px',
        }
      });

      // Auto scroll to the new section
      const frame = editor.Canvas.getFrameEl();
      const totalHeight = wrapper.find('.viup-page-wrap').length * 1000;
      wrapper.view.el.style.minHeight = `${totalHeight}px`;
      frame?.contentWindow?.scrollTo({ top: totalHeight - 1000, behavior: 'smooth' });
    }
  }
});

// Apply to any newly added text
editor.on('component:add', comp => fixTextBox(comp));

// Center the component in pixels (so the plugin can drag smoothly)
function centerInCanvas(comp) {
  const frame = editor.Canvas.getFrameEl();
  const doc = frame?.contentDocument;
  if (!doc || !comp?.view?.el) return;

  const vw = doc.documentElement.clientWidth;
  const vh = doc.documentElement.clientHeight;
  const el = comp.view.el;
  const cw = el.offsetWidth  || 120;  // fallback sizes
  const ch = el.offsetHeight || 30;

  const left = Math.max(0, (vw - cw) / 2);
  const top  = Math.max(0, (vh - ch) / 2);

  comp.addStyle({
    left: `${left}px`,
    top:  `${top}px`,
    right: 'auto',
    bottom: 'auto',
    transform: 'none',
  });
}

<script>
  // === UNIVERSAL MUSIC PLAYER (YouTube + File/URL) ===
  
  // Load YouTube API once and safely store when ready
  let YTReady = false;
  let YTReadyCallbacks = [];
  function onYouTubeIframeAPIReady() {
    YTReady = true;
    YTReadyCallbacks.forEach(fn => fn());
  }
  
  // Inject YouTube API script
  (function() {
    if (!document.querySelector('script[src*="youtube.com/iframe_api"]')) {
      const tag = document.createElement('script');
      tag.src = "https://www.youtube.com/iframe_api";
      document.body.appendChild(tag);
    }
  })();
  
  let viupAudio = null;
  let viupYTPlayer = null;
  
  function parseTimeToSeconds(t) {
    if (!t) return 0;
    const parts = t.split(':').map(Number);
    if (parts.length === 3) return parts[0]*3600 + parts[1]*60 + parts[2];
    if (parts.length === 2) return parts[0]*60 + parts[1];
    return Number(t) || 0;
  }
  function isYouTubeLink(url) { return /youtu\.?be/.test(url); }
  function getYouTubeID(url) {
    const m = url.match(/(?:v=|\/)([0-9A-Za-z_-]{11})/);
    return m ? m[1] : null;
  }
  
  document.getElementById('save-music')?.addEventListener('click', () => {
    const linkInput = document.getElementById('music-link');
    const link  = linkInput?.value.trim() || "";
    const start = parseTimeToSeconds(document.getElementById('music-start').value);
    const end   = parseTimeToSeconds(document.getElementById('music-end').value);
  
    // If file input exists, check for uploaded file
    const fileInput = document.getElementById('music-file');
    const file = fileInput?.files?.[0] || null;
  
    if (!link && !file) {
      alert("Please provide a YouTube link, MP3 URL, or upload a file.");
      return;
    }
  
    // Stop previous players
    if (viupAudio) { viupAudio.pause(); viupAudio.remove(); viupAudio = null; }
    if (viupYTPlayer) { viupYTPlayer.stopVideo(); viupYTPlayer.destroy(); viupYTPlayer = null; }
  
    // === FILE / MP3 MODE ===
    if (file || (!isYouTubeLink(link))) {
      let src = "";
      if (file) {
        src = URL.createObjectURL(file); // create a temporary file URL
      } else {
        src = link;
      }
  
      viupAudio = document.createElement('audio');
      viupAudio.src = src;
      viupAudio.controls = true;
      viupAudio.autoplay = true;
      Object.assign(viupAudio.style, { position:'fixed', bottom:'10px', right:'10px', zIndex:'9999' });
      document.body.appendChild(viupAudio);
  
      viupAudio.addEventListener('loadedmetadata', () => viupAudio.currentTime = start);
      if (end > 0) viupAudio.addEventListener('timeupdate', () => {
        if (viupAudio.currentTime >= end) viupAudio.pause();
      });
      return;
    }
  
    // === YOUTUBE MODE ===
    const vid = getYouTubeID(link);
    if (!vid) return alert("Could not extract YouTube ID.");
  
    let playerDiv = document.getElementById('viup-yt-player');
    if (!playerDiv) {
      playerDiv = document.createElement('div');
      playerDiv.id = 'viup-yt-player';
      Object.assign(playerDiv.style, { position:'fixed', bottom:'10px', right:'10px', width:'320px', height:'180px', zIndex:'9999' });
      document.body.appendChild(playerDiv);
    }
  
    const initYT = () => {
      viupYTPlayer = new YT.Player('viup-yt-player', {
        videoId: vid,
        playerVars: { start, controls: 1 },
        events: {
          onReady: e => e.target.playVideo(),
          onStateChange: e => {
            if (e.data === YT.PlayerState.PLAYING && end > 0) {
              const check = setInterval(() => {
                if (viupYTPlayer.getCurrentTime() >= end) {
                  viupYTPlayer.pauseVideo();
                  clearInterval(check);
                }
              }, 300);
            }
          }
        }
      });
    };
  
    if (YTReady) initYT(); else YTReadyCallbacks.push(initYT);
  });

      document.addEventListener("DOMContentLoaded", () => {
        const slider = document.getElementById("zoom-slider");
        const percent = document.getElementById("zoom-percent");
        const zoomIn = document.getElementById("zoom-in");
        const zoomOut = document.getElementById("zoom-out");
        const fullscreenBtn = document.getElementById("fullscreen-toggle");
        const pageCount = document.getElementById("page-count");
        const canvasFrame = () => editor.Canvas.getFrameEl();
      
        // === Zoom Handling ===
        function applyZoom(value) {
          const zoom = value / 100;
          editor.Canvas.getBody().style.transform = `scale(${zoom})`;
          editor.Canvas.getBody().style.transformOrigin = "top center";
          percent.innerHTML = `<b>${value}%</b>`;
        }
      
        slider.addEventListener("input", e => applyZoom(e.target.value));
        zoomIn.addEventListener("click", () => {
          slider.value = Math.min(200, +slider.value + 10);
          applyZoom(slider.value);
        });
        zoomOut.addEventListener("click", () => {
          slider.value = Math.max(25, +slider.value - 10);
          applyZoom(slider.value);
        });
      
        // === Fullscreen Toggle ===
        fullscreenBtn.addEventListener("click", () => {
          const elem = document.documentElement;
          if (!document.fullscreenElement) {
            elem.requestFullscreen();
            fullscreenBtn.innerHTML = '<i class="fa-solid fa-compress"></i>';
          } else {
            document.exitFullscreen();
            fullscreenBtn.innerHTML = '<i class="fa-solid fa-expand"></i>';
          }
        });
      
        // === Optional: Page Count (update dynamically if you use addPageBelowMain)
        function updatePageCount() {
          const total = editor.getWrapper().find('.viup-page-wrap').length || 1;
          pageCount.innerHTML = `<b>Pages</b> 1 / ${total}`;
        }
        editor.on('component:add', updatePageCount);
        editor.on('component:remove', updatePageCount);

          const apply = () => {
            const style = this.get('borderStyle') || 'solid';
            const col   = this.get('borderColor') || '#ccc';
            const w     = Math.max(1, this.get('thick') || 1);

    // 5) Double-click to edit text content (nice UX)

    // 6) Free-drag toggle (wired to your header button if present)
    let freeDrag = true;

      if (dragBtn) dragBtn.textContent = freeDrag ? 'Free Move: ON' : 'Free Move: OFF';

    function createArtboard({ width = 1080, height = 1920, preset = 'Custom' } = {}) {
  const count = editor.Pages.getAll().length + 1;
  const id = `artboard-${Date.now()}-${Math.floor(Math.random() * 9999)}`;
  const name = `Artboard ${count}`;

  // Use FRAMES (more reliable across 0.21.x)
  const page = editor.Pages.add({

      // Optional page-specific CSS for a visible “board”
      styles: `

    function renderArtboardList() {
      if (!pagesUI) return;
      const pages = editor.Pages.getAll();
      const active = editor.Pages.getActive();
      pagesUI.innerHTML = '';
      pages.forEach(pg => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'viup-artboard-chip';
        btn.style.cssText = `
          padding:6px 10px;margin:4px;border-radius:8px;border:1px solid #ddd;cursor:pointer;

        `;
        btn.textContent = pg.get('name');
        btn.title = pg.get('id');

          editor.Pages.setActive(pg);

        });

        if (pick === 'square') spec = { width:1080, height:1080, preset:'Square' };
